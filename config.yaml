# ============================================================
# Konfigurasi Bot Trading EMA Cross + CCI
# ============================================================

# ============================================================
# Mode Bot
# ============================================================
demo_mode: true               # true = Simulasi / Paper Trading, false = Real Trade

exchange:
  name: binance
  market_type: future           # USDⓈ-M Futures

strategy:
  ema_fast: 10                  # EMA 1 (Fast Momentum) length
  ema_slow: 20                  # EMA 2 (Trend) length
  cci_length: 20                # CCI (Momentum Filter) length
  valid_timeframes:             # Whitelist TF (1m DILARANG)
    - "15m"
    - "1h"
    - "4h"
  active_timeframes:            # TF yang AKTIF dieksekusi
    - "15m"
  entry_mode: "close"           # "close" = masuk di candle close, "pullback" = tunggu retrace ke EMA fast
  swing_lookback: 10            # Jumlah candle untuk deteksi swing high/low
  pullback_ttl_candles: 3       # (pullback mode) Batal jika tidak terisi dalam N candle

risk:
  risk_reward_ratio: 2.0        # Rasio Risk:Reward (1:2)
  sl_mode: "swing_low"          # "swing_low" = swing point, "ema_slow" = di bawah/atas EMA slow
  sl_buffer_pct: 0.05           # Buffer tambahan SL dalam persen (0.05 = 0.05%)
  max_position_size_pct: 5.0    # Maks % balance per posisi
# fixed_margin = margin tetap
# pct_balance = % balance
# fallback = fallback ke max_position_size_pct global
pairs:
  - symbol: "BTC/USDT"
    leverage: 20
    margin_mode: "isolated"
    risk_mode: "fixed_margin"
    fixed_margin_usdt: 50.0       # Margin tetap 50 USDT
  - symbol: "ETH/USDT"
    leverage: 10
    margin_mode: "isolated"
    risk_mode: "pct_balance"
    risk_pct_balance: 3.0         # Gunakan 3% dari total balance
  - symbol: "SOL/USDT"
    leverage: 10
    margin_mode: "isolated"
    # Tanpa risk_mode -> fallback ke risk.max_position_size_pct (5.0%) global

telegram:
  enabled: true
  notify_signals: true          # Kirim notif saat sinyal muncul
  notify_fills: true            # Kirim notif saat order terisi
  notify_sl_tp: true            # Kirim notif saat SL/TP hit
  notify_errors: true           # Kirim notif saat error/disconnect

mongodb:
  database: "ema_cci_bot"
  collection_trades: "trades"
  collection_signals: "signals"

logging:
  level: "INFO"                 # DEBUG, INFO, WARNING, ERROR
  file: "logs/bot.log"          # Path file log
  rotation: "10 MB"             # Rotasi per ukuran file
  retention: "7 days"           # Simpan log selama 7 hari
